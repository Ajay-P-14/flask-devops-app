apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-devops-app
  labels:
    app: flask-devops-app

spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: flask-devops-app

  template:
    metadata:
      labels:
        app: flask-devops-app

    spec:
      containers:
      - name: flask-devops-app
        image: ajay3502/flask-devops-app:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 5000

        env:
        - name: APP_ENV
          value: "production"
        - name: PORT
          value: "5000"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
          timeoutSeconds: 5

        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 5
